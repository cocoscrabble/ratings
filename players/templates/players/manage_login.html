{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — CocoDB</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <header class="site-header">
    <a href="/" class="logo-link">
      <img src="{% static 'img/logo.png' %}" alt="Coco Scrabble" class="site-logo">
    </a>
  </header>

  <main class="main-content">
    <div class="login-container">
      <h1>Admin Login</h1>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="coco-button">Log in</button>
      </form>
    </div>
  </main>
</body>
</html>
