<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CocoDB Admin{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="site-header">
    <a href="/" class="logo-link">
      <img src="/static/img/logo.png" alt="Coco Scrabble" class="site-logo">
    </a>
    <nav class="manage-nav">
      <a href="/manage/players/">Players</a>
      <a href="/manage/ratings/">Ratings</a>
      <a href="/manage/import/">Import</a>
      <a href="/manage/logout/">Log out</a>
    </nav>
  </header>

  <main class="main-content">
    {% if messages %}
    <ul class="messages">
      {% for message in messages %}
      <li class="message message-{{ message.tags }}">{{ message }}</li>
      {% endfor %}
    </ul>
    {% endif %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
