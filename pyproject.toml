[project]
name = "cocodb"
version = "0.1.0"
description = "Player data management for a Scrabble organisation"
requires-python = ">=3.13"
dependencies = [
    "django>=6.0",
    "django-environ>=0.11",
    "psycopg2-binary>=2.9",
    "gunicorn>=23.0",
]

[dependency-groups]
dev = [
    "ruff>=0.9",
]

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.isort]
known-first-party = ["cocodb", "players"]
