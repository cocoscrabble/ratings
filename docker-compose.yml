services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cocodb
      POSTGRES_USER: cocodb
      POSTGRES_PASSWORD: cocodb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    command: uv run manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://cocodb:cocodb@db:5432/cocodb
      DEBUG: "True"
      SECRET_KEY: local-dev-secret-key
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
    depends_on:
      - db

volumes:
  postgres_data:
